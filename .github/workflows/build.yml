name: "Build Free APK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  build_apk:
    name: Compile Free Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code using the updated stable version
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Handle app's internal configuration rules
      - name: Rename Pubspec Overrides
        run: |
          if [ -f pubspec_overrides_ci.yaml ]; then
              mv pubspec_overrides_ci.yaml pubspec_overrides.yaml
          else 
              echo "No pubspec_overrides_ci.yaml found, skipping rename."
          fi

      # 3. Setup clean Flutter framework
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # 4. Generate system translation files (the compilation crashes without this)
      - name: Generate Translation Files
        run: |
          flutter pub global activate intl_utils
          flutter pub global run intl_utils:generate

      # 5. Prevent Gradle from throwing a fit over missing signing configurations
      - name: Create Dummy Keystore Profile
        run: |
          echo "" > android/android.keystore
          echo "storePassword=dummypassword" > android/keystore.properties
          echo "keyPassword=dummypassword" >> android/keystore.properties
          echo "keyAlias=dummyalias" >> android/keystore.properties
          echo "storeFile=android.keystore" >> android/keystore.properties

      # 6. Compile the raw, un-monetized application binary
      - name: Build Pure Release APK
        run: flutter build apk --release

      # 7. Throw the finished installer straight onto your Summary page for instant download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeControl-Free
          path: build/app/outputs/flutter-apk/*.apk
