name: "Build Free APK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  build_apk:
    name: Compile Free Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout core repository layout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Sync baseline override protocols
      - name: Rename Pubspec Overrides
        run: |
          if [ -f pubspec_overrides_ci.yaml ]; then
              mv pubspec_overrides_ci.yaml pubspec_overrides.yaml
          else 
              echo "No pubspec_overrides_ci.yaml found, skipping rename."
          fi

      # 3. Inject fully mocked signature model to spoof all app boundaries
      - name: Inject Complete Mock API Surface
        run: |
          mkdir -p prop/lib/emulators/definitions
          mkdir -p prop/lib/emulators/transporter
          mkdir -p prop/lib/services
          mkdir -p prop/lib/utils

          echo "name: prop" > prop/pubspec.yaml
          echo "version: 1.0.0" >> prop/pubspec.yaml
          echo "environment:" >> prop/pubspec.yaml
          echo "  sdk: '>=3.0.0 <4.0.0'" >> prop/pubspec.yaml

          cat << 'EOF' > prop/lib/stub.dart
          import 'package:flutter/foundation.dart';

          class LogLevel {
            final int value;
            const LogLevel(this.value);
            static const LOGLEVEL_INFO = LogLevel(0);
            static const LOGLEVEL_WARNING = LogLevel(1);
            static const LOGLEVEL_ERROR = LogLevel(2);
            static const LOGLEVEL_DEBUG = LogLevel(3);
          }

          class TrainerMode {
            final int value;
            const TrainerMode(this.value);
            static const simMode = TrainerMode(0);
            static const ergMode = TrainerMode(1);
            static const simModeVirtualShifting = TrainerMode(2);
            static const values = [simMode, ergMode, simModeVirtualShifting];
          }

          class RetrofitMode {
            final String label;
            const RetrofitMode(this.label);
            static const proxy = RetrofitMode('Proxy');
            static const bluetooth = RetrofitMode('Bluetooth');
            static const wifi = RetrofitMode('WiFi');
            static const values = [proxy, bluetooth, wifi];
          }

          class VirtualShiftingMode {
            final int value;
            const VirtualShiftingMode(this.value);
            static const targetPower = VirtualShiftingMode(0);
            static const trackResistance = VirtualShiftingMode(1);
            static const basicResistance = VirtualShiftingMode(2);
            static const values = [targetPower, trackResistance, basicResistance];
          }

          class Di2ButtonState {
            final int value;
            const Di2ButtonState(this.value);
            static const released = Di2ButtonState(0);
            static const longPress = Di2ButtonState(1);
            static const shortPress = Di2ButtonState(2);
          }

          class Opcode {
            final int value;
            const Opcode(this.value);
            static const RESET = Opcode(0);
            static const CONTROLLER_NOTIFICATION = Opcode(1);
            static const RIDE_ON = Opcode(2);
            static const STATUS_RESPONSE = Opcode(3);
            static const GET_RESPONSE = Opcode(4);
            static const VENDOR_MESSAGE = Opcode(5);
            static const LOG_DATA = Opcode(6);
            static const BATTERY_NOTIF = Opcode(7);
            static Opcode valueOf(dynamic x) => RESET;
          }

          class DO {
            final int value;
            const DO(this.value);
            static const PAGE_DEV_INFO = DO(0);
            static const PAGE_DATE_TIME = DO(1);
            static const PAGE_CONTROLLER_INPUT_CONFIG = DO(2);
            static DO valueOf(dynamic x) => PAGE_DEV_INFO;
          }

          class Status {
            static valueOf(dynamic x) => null;
          }

          class FitnessBikeDefinition {
            static const HEART_RATE_MEASUREMENT_UUID = '180d';
            static const CYCLING_POWER_SERVICE_UUID = '1818';
            static const FITNESS_MACHINE_SERVICE_UUID = '1826';
            static const FEC_BLE_SERVICE_UUID = 'fec';
            static dynamic defaultGearRatios = [1.0];
            static defaultGearRatiosFor(dynamic x) => [1.0];

            final ValueNotifier<TrainerMode> trainerMode = ValueNotifier(TrainerMode.simMode);
            final ValueNotifier<int?> currentGear = ValueNotifier(1);
            final ValueNotifier<int?> powerW = ValueNotifier(0);
            final ValueNotifier<int?> cadenceRpm = ValueNotifier(0);
            final ValueNotifier<double?> speedKph = ValueNotifier(0.0);
            final ValueNotifier<int?> heartRateBpm = ValueNotifier(0);
            final ValueNotifier<double> gearRatio = ValueNotifier(1.0);
            final ValueNotifier<int?> ergTargetPower = ValueNotifier(150);
            final ValueNotifier<int?> targetPowerW = ValueNotifier(150);
            final ValueNotifier<double> bicycleWeightKg = ValueNotifier(10.0);
            final ValueNotifier<double> riderWeightKg = ValueNotifier(70.0);
            final ValueNotifier<List<double>> gearRatios = ValueNotifier([1.0]);
            final ValueNotifier<bool> gradeSmoothingEnabled = ValueNotifier(false);
            final ValueNotifier<bool> cadenceFilterEnabled = ValueNotifier(false);
            final ValueNotifier<dynamic> virtualShiftingMode = ValueNotifier(null);
            final ValueNotifier<dynamic> trainerFeature = ValueNotifier(null);

            int get maxGear => 11;
            dynamic get trainerFtmsMachineFeatureFlagNames => null;
            dynamic get trainerFtmsTargetSettingFlagNames => null;
            dynamic get neutralGear => null;

            Future<void> probeTrainerFeatures() async {}
            void setMaxGear(dynamic x) {}
            void setBicycleWeightKg(dynamic x) {}
            void setRiderWeightKg(dynamic x) {}
            void setGradeSmoothingEnabled(dynamic x) {}
            void setCadenceFilterEnabled(dynamic x) {}
            void setVirtualShiftingMode(dynamic x) {}
            void resetGearRatios() {}
            void setGearRatio(dynamic a, dynamic b) {}
            bool shiftUp() => true;
            bool shiftDown() => true;
            void exitErgMode() {}
            void adjustIntensity(dynamic x) {}
            void setManualErgPower(dynamic x) {}
            bool supportsVirtualShiftingMode(dynamic x) => true;
          }

          class ProxyBikeDefinition extends FitnessBikeDefinition {}
          class Di2Definition {
            static standalone({dynamic data}) => Di2Definition();
            void sendChannelStates(dynamic x) {}
          }
          class BleDefinition {}

          class BridgeUsageTracker {
            BridgeUsageTracker([dynamic a, dynamic b]);
            bool get isExhausted => false;
            void startSession({dynamic isActive}) {}
            Stream<dynamic> get onBudgetExhausted => const Stream.empty();
            void stopSession() {}
            ValueNotifier<int> get usedTodayListenable => ValueNotifier(0);
            int get dailyLimit => 0;
          }

          class NetworkTransporter {
            NetworkTransporter([dynamic a, dynamic b, dynamic c]);
            void handleIncomingData(dynamic x) {}
            void sendCharacteristicNotification(dynamic a, dynamic b) {}
          }

          class BluetoothTransporter {
            BluetoothTransporter({dynamic definition, dynamic advertisementName});
            ValueNotifier<bool> get hasSubscribers => ValueNotifier(false);
            Future<void> start() async {}
            void dispose() {}
          }

          class DirconEmulator {
            final ValueNotifier<bool> isConnected = ValueNotifier(false);
            final ValueNotifier<RetrofitMode> retrofitMode = ValueNotifier(RetrofitMode.proxy);
            final ValueNotifier<bool> isStarted = ValueNotifier(false);
            final ValueNotifier<dynamic> data = ValueNotifier(null);

            FitnessBikeDefinition? get activeDefinition => FitnessBikeDefinition();
            String get advertisementName => '';
            dynamic get services => [];

            dynamic onFitnessBikeDefinitionCreated;
            dynamic isTrial;
            dynamic shouldAdvertise;
            dynamic trainerName;

            Future<void> pauseAdvertising() async {}
            void setRetrofitMode(dynamic x) {}
            Future<void> startServer() async {}
            void stop() {}
            dynamic processCharacteristic(dynamic a, dynamic b) => null;
            void handleServices(dynamic x) {}
            void setScanResult(dynamic x) {}
            Future<void> switchRetrofitMode(dynamic x) async {}
          }

          class ClickEmulator {
            ValueNotifier<bool> get isStarted => ValueNotifier(false);
            ValueNotifier<bool> get isConnected => ValueNotifier(false);
            dynamic startServer(dynamic a, {dynamic name}) => null;
            void stop() {}
            void writeNotification(dynamic x) {}
          }

          class PropPrefs {
            const PropPrefs();
            void initialize(dynamic x) {}
            dynamic getZwiftClickV2LastUnlock(dynamic x) => DateTime.now();
            bool notSureIfUnlocked(dynamic x) => false;
            void setNotSureIfUnlocked(dynamic x, dynamic y) {}
            void setZwiftClickV2LastUnlock(dynamic x, dynamic y) {}
          }
          const propPrefs = PropPrefs();

          class SharedLogic {
            static void keepAlive() {}
            static void stopKeepAlive() {}
            static dynamic handleWriteRequest(dynamic x, dynamic y) => null;
          }

          class Logger {
            static void debug(dynamic x) {}
            static void info(dynamic x) {}
            static void warn(dynamic x) {}
            static void error(dynamic x) {}
          }

          class StatusResponse { static fromBuffer(dynamic x) => StatusResponse(); dynamic get command => ''; dynamic get status => ''; }
          class GetResponse { static fromBuffer(dynamic x) => GetResponse(); dynamic get dataObjectId => 0; dynamic get dataObjectData => null; }
          class DevInfoPage { static fromBuffer(dynamic x) => DevInfoPage(); }
          class DateTimePage { static fromBuffer(dynamic x) => DateTimePage(); }
          class ControllerInputConfigPage { static fromBuffer(dynamic x) => ControllerInputConfigPage(); }
          class LogDataNotification { static fromBuffer(dynamic x) => LogDataNotification(); }
          class BatteryNotification { static fromBuffer(dynamic x) => BatteryNotification(); }
          class BatteryStatus { static fromBuffer(dynamic x) => BatteryStatus(); }

          class RideKeyPadStatus { 
            static fromBuffer(dynamic x) => RideKeyPadStatus(); 
            int buttonMap = 0; 
            List get analogPaddles => [];
            List<int> writeToBuffer() => [];
          }
          class ClickKeyPadStatus { 
            static fromBuffer(dynamic x) => ClickKeyPadStatus(); 
            dynamic get buttonPlus => PlayButtonStatus.ON;
            dynamic get buttonMinus => PlayButtonStatus.ON;
          }
          class PlayKeyPadStatus { 
            static fromBuffer(dynamic x) => PlayKeyPadStatus(); 
            dynamic get rightPad => PlayButtonStatus.ON;
            dynamic get buttonYUp => PlayButtonStatus.ON;
            dynamic get buttonZLeft => PlayButtonStatus.ON;
            dynamic get buttonARight => PlayButtonStatus.ON;
            dynamic get buttonBDown => PlayButtonStatus.ON;
            dynamic get buttonOn => PlayButtonStatus.ON;
            dynamic get buttonShift => PlayButtonStatus.ON;
          }

          class PlayButtonStatus {
            static const ON = PlayButtonStatus();
            static const OFF = PlayButtonStatus();
            int get value => 1;
            const PlayButtonStatus();
            @override
            bool operator ==(Object other) => true;
            @override
            int get hashCode => 0;
          }

          class RideButtonMask { 
            static const LEFT_BTN = RideButtonMask(); 
            static const RIGHT_BTN = RideButtonMask(); 
            static const UP_BTN = RideButtonMask(); 
            static const DOWN_BTN = RideButtonMask(); 
            static const A_BTN = RideButtonMask(); 
            static const B_BTN = RideButtonMask(); 
            static const Y_BTN = RideButtonMask(); 
            static const Z_BTN = RideButtonMask(); 
            static const SHFT_UP_L_BTN = RideButtonMask(); 
            static const SHFT_DN_L_BTN = RideButtonMask(); 
            static const SHFT_UP_R_BTN = RideButtonMask(); 
            static const SHFT_DN_R_BTN = RideButtonMask(); 
            static const POWERUP_L_BTN = RideButtonMask(); 
            static const POWERUP_R_BTN = RideButtonMask(); 
            static const ONOFF_L_BTN = RideButtonMask(); 
            static const ONOFF_R_BTN = RideButtonMask(); 
            int get mask => 0;
            const RideButtonMask();
          }

          dynamic bytesToHex(dynamic x) => '';
          dynamic bytesToReadableHex(dynamic x) => '';
          EOF

          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/definitions/fitness_bike_definition.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/definitions/proxy_bike_definition.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/definitions/di2_definition.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/services/bridge_usage_tracker.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/utils/shared.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/transporter/network_transporter.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/transporter/bluetooth_transporter.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/ble_definition.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/emulators/dircon_emulator.dart
          echo "export 'package:prop/stub.dart';" > prop/lib/prop.dart

      # 4. Setup Flutter SDK
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # 5. Build system localizations
      - name: Generate Translation Files
        run: |
          flutter pub global activate intl_utils
          flutter pub global run intl_utils:generate

      # 6. Build dummy keystore values
      - name: Create Dummy Keystore Profile
        run: |
          echo "" > android/android.keystore
          echo "storePassword=dummypassword" > android/keystore.properties
          echo "keyPassword=dummypassword" >> android/keystore.properties
          echo "keyAlias=dummyalias" >> android/keystore.properties
          echo "storeFile=android.keystore" >> android/keystore.properties

      # 7. Compile the unlinked release app package
      - name: Build Pure Release APK
        run: flutter build apk --release

      # 8. Deliver package download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeControl-Free
          path: build/app/outputs/flutter-apk/*.apk
